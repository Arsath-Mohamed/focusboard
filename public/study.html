<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Study | FocusBoard</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="accent-study">
  <script src="/app.js"></script>
  <script>
    requireAuth();

    async function init() {
      try {
        await loadAppState();
        const items = await api('/api/studySessions', { headers: authHeaders() });
        renderStudy(items);
      } catch (err) {
        console.error('Failed to load study page:', err);
      }
    }

    function renderStudy(items) {
      const { today } = APP_STATE;
      const studyGoal = today.goals.find(g => g.type === 'study') || { completed: 0, target: 120 };
      const percentage = Math.min(100, Math.round((studyGoal.completed / studyGoal.target) * 100));

      shell('study.html', 'Study Mastery', 'Track focus hours and problem-solving progress.', `
        <div class="grid grid-2">
          <!-- Session Form -->
          <div class="card card-form">
            <h3 style="margin-top:0; font-weight:900;">Log Session</h3>
            <div style="margin-bottom:24px">
              <div class="goal-header">
                <span>Daily Target</span>
                <span>${studyGoal.completed}/${studyGoal.target}m</span>
              </div>
              <div class="goal-bar-bg">
                <div class="goal-bar-fill" style="width: ${percentage}%"></div>
              </div>
            </div>

            <div class="form-group">
              <label>Topic / Subject</label>
              <input id="topic" placeholder="e.g. Data Structures, React Patterns">
            </div>
            <div class="grid grid-2">
               <div class="form-group">
                <label>Minutes</label>
                <input id="minutes" type="number" value="30">
              </div>
              <div class="form-group">
                <label>Problems</label>
                <input id="problems" type="number" value="0">
              </div>
            </div>
            <div class="form-group">
              <label>Date</label>
              <input id="date" type="date" value="${new Date().toISOString().split('T')[0]}">
            </div>
            <div class="form-group">
              <label>Notes</label>
              <textarea id="notes" rows="3" placeholder="Key takeaways..."></textarea>
            </div>
            <button class="btn btn-primary btn-auth" onclick="saveSession()">Save Execution</button>
          </div>

          <!-- Session Log -->
          <div class="card">
            <h3 style="margin:0 0 24px 0; font-weight:900;">Activity History</h3>
            <div class="list">
              ${items.length ? items.map(i => `
                <div class="item-card">
                  <div style="flex-grow:1">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px">
                      <span class="duration-tag">${i.minutes}m</span>
                      <strong style="font-size:18px">${i.topic}</strong>
                    </div>
                    <div class="muted" style="margin-bottom:8px">${i.date} · ${i.problemsSolved} problems solved</div>
                    ${i.notes ? `<p class="muted" style="margin:0; font-size:13px; line-height:1.4">${i.notes}</p>` : ''}
                  </div>
                  <button class="btn-delete" onclick="removeSession('${i._id}')">Remove</button>
                </div>
              `).join('') : '<div class="empty">No sessions recorded yet. Start executing!</div>'}
            </div>
          </div>
        </div>
      `);
    }

    async function saveSession() {
      const payload = {
        topic: qs('#topic').value,
        minutes: parseInt(qs('#minutes').value),
        problemsSolved: parseInt(qs('#problems').value),
        date: qs('#date').value,
        notes: qs('#notes').value
      };

      try {
        await api('/api/studySessions', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        // Sync with Daily Goals
        const studyGoal = APP_STATE.today.goals.find(g => g.type === 'study');
        await api(`/api/today/goals/study`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ completed: (studyGoal?.completed || 0) + payload.minutes })
        });

        toast('Session Saved & Goals Updated!');
        setTimeout(init, 500);
      } catch (err) {
        toast(err.message);
      }
    }

    async function removeSession(id) {
      if (!confirm('Permanent delete?')) return;
      try {
        await api('/api/studySessions/' + id, { method: 'DELETE', headers: authHeaders() });
        toast('Deleted');
        setTimeout(init, 300);
      } catch (err) {
        toast(err.message);
      }
    }

    init();
  </script>
</body>
</html>
